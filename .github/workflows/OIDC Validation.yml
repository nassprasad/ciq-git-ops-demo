name: AWS OIDC Demo

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  aws-infra-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::292123551780:role/GitHubActionsOIDC-demo-role
          aws-region: ap-south-1

      - name: Verify OIDC Authentication
        run: aws sts get-caller-identity

      - name: List S3 Bucket
        run: aws s3 ls
